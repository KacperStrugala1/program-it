
{% block title %}Profil | ProgramIT{% endblock %}

<main class="profile-wrapper">
  <div class="code-window">
    <div class="window-header">~/ProgramIT/profile.html</div>

    <div class="grid-two">

      <!-- === LEWA KOLUMNA – PROFIL === -->
      <div class="profile-info">
        <div class="profile-avatar">
          <img src="{{profile.avatar_url}}" alt="avatar" />
        </div>

        <h1>{{ user.username }}</h1>

        <button
          id="edit-toggle"
          class="mt-4 bg-[#61afef] text-[#1e1e1e] px-3 py-1 rounded hover:bg-[#4fa3d1] transition text-sm font-semibold"
        >
          Edit profile
        </button>

        <form
          id="edit-form"
          method="POST"
          class="hidden mt-4 flex flex-col gap-2 bg-[#21252b] p-3 rounded border border-[#3e4451]"
        >
          {% csrf_token %}
          <label class="text-sm text-[#98c379]">Profile Image:</label>
          {% if profile.avatar_url %}
            <img src="{{ profile.avatar_url }}" alt="avatar" class="w-32 h-32 rounded-full mb-2 border border-[#61afef]" />
          {% endif %}
          <input type="file" name="avatar"
                accept="image/*"
                class="bg-[#1e1e1e] text-[#abb2bf] border border-[#3e4451] rounded px-2 py-1" />

          <label class="text-sm text-[#98c379]">Username:</label>
          <input name="username" value="{{ profile.username }}"
                 class="bg-[#1e1e1e] text-[#abb2bf] border border-[#3e4451] rounded px-2 py-1" />

          <label class="text-sm text-[#98c379]">Description:</label>
          <textarea name="description" rows="2"
                    class="bg-[#1e1e1e] text-[#abb2bf] border border-[#3e4451] rounded px-2 py-1">{{ profile.description }}</textarea>

          <label class="text-sm text-[#98c379]">GitHub Username:</label>
          <input name="github_username" value="{{ profile.github_username }}"
                 class="bg-[#1e1e1e] text-[#abb2bf] border border-[#3e4451] rounded px-2 py-1" />

          <button type="submit"
                  class="bg-[#98c379] text-[#1e1e1e] px-3 py-1 rounded font-semibold hover:bg-[#7cbf69] transition">
            Save
          </button>
        </form>
      </div>

  </div>
</main>

{% endblock %}
